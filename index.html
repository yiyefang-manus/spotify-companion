<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify Companion</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- WebGL Liquid Glass Background (covers entire window) -->
  <canvas id="liquid-bg"></canvas>
  <!-- Dark mode overlay -->
  <div id="dark-overlay"></div>
  <!-- Album art blurred background (hidden by default) -->
  <div id="album-bg" class="album-bg hidden"></div>
  <!-- Frosted glass background (hidden by default) -->
  <div id="frosted-bg" class="frosted-bg hidden"></div>


  <!-- Custom Context Menu -->
  <div id="context-menu" class="context-menu hidden">
    <div class="context-menu-item" id="ctx-like"><span class="ctx-icon">♡</span> Like Song</div>
    <div class="context-menu-item" id="ctx-share"><span class="ctx-icon">↗</span> Share</div>
    <div class="context-menu-item" id="ctx-open-spotify"><span class="ctx-icon">🎵</span> Open in Spotify</div>
    <div class="context-menu-divider"></div>
    <div class="context-menu-item" id="ctx-copy-name"><span class="ctx-icon">📋</span> Copy Song Name</div>
    <div class="context-menu-item" id="ctx-copy-link"><span class="ctx-icon">🔗</span> Copy Song Link</div>
  </div>

  <!-- Setup Screen -->
  <div id="setup-screen" class="screen">
    <div class="setup-content">
      <input type="text" id="client-id-input" placeholder="Spotify Client ID" spellcheck="false">
      <button id="connect-btn" class="btn-primary">Connect</button>
      <a href="#" id="help-link" class="help-link">Get ID</a>
    </div>
  </div>

  <!-- Main Player (single window) -->
  <div id="player-screen" class="screen hidden">
    <!-- Drag region -->
    <div class="drag-region"></div>

    <!-- Player content -->
    <div class="player-content">
      <!-- Main row: album art + info + controls -->
      <div class="player-row">
        <!-- Left: Album Art + Track Info -->
        <div class="player-left">
          <div class="album-art-container">
            <img id="album-art" src="" alt="" class="album-art hidden">
            <div id="no-art" class="no-art">♫</div>
          </div>
          <div class="track-info">
            <div id="track-name" class="track-name">Not Playing</div>
            <div id="track-artist" class="track-artist">—</div>
          </div>
        </div>

        <!-- Center: Playback Controls -->
        <div class="player-center">
          <div class="controls">
            <button id="btn-shuffle" class="control-btn small" title="Shuffle">
              <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
            </button>
            <button id="btn-prev" class="control-btn" title="Previous">
              <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            <button id="btn-play" class="control-btn play-btn" title="Play/Pause">
              <svg id="icon-play" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
              <svg id="icon-pause" viewBox="0 0 24 24" width="18" height="18" class="hidden"><path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button id="btn-next" class="control-btn" title="Next">
              <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
            <button id="btn-repeat" class="control-btn small" title="Repeat">
              <svg id="icon-repeat-all" viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
              <svg id="icon-repeat-one" viewBox="0 0 24 24" width="14" height="14" class="hidden"><path fill="currentColor" d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/><text x="12" y="15" font-size="7" text-anchor="middle" fill="currentColor" font-weight="bold">1</text></svg>
            </button>
          </div>
          <!-- Progress bar -->
          <div class="progress-container">
            <span id="time-current" class="time">0:00</span>
            <div class="progress-bar" id="progress-bar">
              <div class="progress-fill" id="progress-fill">
                <div class="progress-thumb"></div>
              </div>
            </div>
            <span id="time-total" class="time">0:00</span>
          </div>
        </div>

        <!-- Right: Extra Controls -->
        <div class="player-right">
          <button id="btn-like" class="control-btn small" title="Like">
            <svg id="icon-heart-outline" viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l1.45-1.32C18.6 15.36 22 12.28 22 8.5 22 5.42 19.58 3 16.5 3zm-4.4 15.55l-.1.1-.1-.1C7.14 14.24 4 11.39 4 8.5 4 6.5 5.5 5 7.5 5c1.54 0 3.04.99 3.57 2.36h1.87C13.46 5.99 14.96 5 16.5 5c2 0 3.5 1.5 3.5 3.5 0 2.89-3.14 5.74-7.9 10.05z"/></svg>
            <svg id="icon-heart-filled" viewBox="0 0 24 24" width="14" height="14" class="hidden"><path fill="#1DB954" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
          </button>
          <button id="btn-lyrics" class="control-btn small" title="Lyrics">
            <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 9H7v-2h6v2zm2-4H7V5h8v2zm-2 8H7v-2h6v2z"/></svg>
          </button>
          <button id="btn-devices" class="control-btn small" title="Devices">
            <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M4 6h18V4H2v13H0v3h14v-3H4V6zm20 2h-8v12h8V8zm-2 9h-4v-7h4v7z"/></svg>
          </button>
          <button id="btn-mini" class="control-btn small" title="Mini Mode">
            <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M19 11h-8v6h8v-6zm4 8V4.98C23 3.88 22.1 3 21 3H3c-1.1 0-2 .88-2 1.98V19c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2zm-2 .02H3V4.97h18v14.05z"/></svg>
          </button>

          <button id="btn-settings" class="control-btn small" title="Settings">
            <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.61 3.61 0 018.4 12 3.61 3.61 0 0112 8.4a3.61 3.61 0 013.6 3.6 3.61 3.61 0 01-3.6 3.6z"/></svg>
          </button>
          <button id="btn-close" class="control-btn close-btn small" title="Close">
            <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </button>
        </div>
      </div>

      <!-- Audio Waveform Visualization (between controls and lyrics) -->
      <canvas id="waveform-canvas"></canvas>

      <!-- Current lyric line -->
      <div class="lyrics-line-container" id="lyrics-container">
        <div id="current-lyric" class="current-lyric"></div>
      </div>
    </div>

    <!-- Devices Panel -->
    <div id="devices-panel" class="devices-panel hidden">
      <div class="devices-header">
        <span>Devices</span>
        <button id="devices-close" class="playlist-close-btn">✕</button>
      </div>
      <div id="devices-list" class="devices-list"></div>
    </div>

    <!-- Settings Panel -->
    <div id="settings-panel" class="settings-panel hidden">
      <div class="settings-header">
        <span>Settings</span>
        <button id="settings-close" class="playlist-close-btn">✕</button>
      </div>
      <div class="settings-body">
        <div class="settings-row">
          <label class="settings-label">Theme</label>
          <div class="theme-toggle">
            <button id="theme-light" class="theme-btn active" title="Light">☀</button>
            <button id="theme-dark" class="theme-btn" title="Dark">☾</button>
          </div>
        </div>
        <div class="settings-row">
          <label class="settings-label">Lyrics Size</label>
          <div class="size-control">
            <span class="size-preview" id="size-preview">11px</span>
            <input type="range" id="lyrics-size-slider" min="11" max="18" value="13" step="1">
          </div>
        </div>
        <div class="settings-row">
          <label class="settings-label">Background</label>
          <div class="bg-toggle">
            <button id="bg-animated" class="bg-btn active" title="Animated Liquid">🌊</button>
            <button id="bg-static" class="bg-btn" title="Static Liquid">🧊</button>
            <button id="bg-frosted" class="bg-btn" title="Frosted Glass">❄️</button>
            <button id="bg-album" class="bg-btn" title="Album Art">🎨</button>
          </div>
        </div>
        <div class="settings-row">
          <label class="settings-label">BG Opacity</label>
          <div class="size-control">
            <span class="size-preview" id="opacity-preview">90%</span>
            <input type="range" id="bg-opacity-slider" min="20" max="100" value="90" step="5">
          </div>
        </div>
        <div class="settings-row">
          <label class="settings-label">BG Blur</label>
          <div class="blur-toggle">
            <button id="blur-on" class="theme-btn active" title="On">On</button>
            <button id="blur-off" class="theme-btn" title="Off">Off</button>
          </div>
        </div>
      </div>
    </div>



  </div>

  <script src="liquid-bg.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
